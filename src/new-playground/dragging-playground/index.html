<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Resizing playground</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<section id="main">
			<h1>Drag the square around</h1>
			<section id="controls">
				<label for="friction">friction:</label>
				<input type="range" id="friction" min="1" max="100">
				<span id="frictionValue"></span>
			</section>

			<section id="controls">
				<label for="pull">pull:</label>
				<input type="range" id="pull" min="1" max="100">
				<span id="pullValue"></span>
			</section>

			<section id="controls">
				<label for="weight">weight:</label>
				<input type="range" id="weight" min="1" max="100">
				<span id="weightValue"></span>
			</section>

			<h1 for="presets">Select from presets</h1>
			<select id="presets">
				<option value="">
					select a preset
				</option>
				<option value="bouncy">bouncy</option>
				<option value="heavy">heavy</option>
				<option value="flexible">flexible</option>
				<option value="jiggly">jiggly</option>
				<option value="straightforward">straightforward</option>
			</select>
			<div id="debug"></div>
		</section>
		<canvas id="canvas"></canvas>
		<script type="module" src="script.js"></script>
	</body>
</html>
