<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>bare bones</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div id="label">
			<p>
				Icons in a dock rise up with anticipation when you hover, eager to be picked. But what if that eagerness wore out with use? Click an icon repeatedly and watch it lose its energy. Use the greyscale toggle to make the wear visible.
			</p>
		</div>
		<div id="stage"></div>
		<button id="greyscale-toggle" class="active">greyscale: on</button>
		<script type="module" src="script.js"></script>
	</body>
</html>
