	<body>
		<section id="main">
			<h1>Start scribbling</h1>
			<section id="controls">
				<label for="friction">friction:</label>
				<input type="range" id="friction" min="1" max="100">
				<span id="frictionValue"></span>
			</section>

			<section id="controls">
				<label for="pull">pull:</label>
				<input type="range" id="pull" min="1" max="100">

			</section>

			<section id="controls">
				<label for="weight">weight:</label>

				<span id="weightValue"></span>
			</section>

			<h1 for="presets">select from presets</h1>
			<select id="presets">
				<option value="">

				</option>

				<option value="quick">quick</option>
				<option value="lovely">lovely</option>
				<option value="slow">slow</option>
				<option value="eager">eager</option>
				<option value="easy">easy</option>
				<option value="rushed">rushed</option>
				<option value="energetic">energetic</option>
				<option value="shaky">shaky</option>
				<option value="deliberate">deliberate</option>
			</select>
			<button id="clearBtn">Clear</button>
			<div id="debug"></div>
